<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>10-Waves</title>

    <!-- AR Libraries -->
    <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
    <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

    <!-- 8th Wall Engine -->
    <script async src="../engine/xr.js" data-preload-chunks="slam"></script>
    <script>

        const onxrloaded = () => {
            XR8.XrController.configure({
                imageTargetData: [
                    {
                        "name": "poster",
                        "type": "PLANAR",
                        "imagePath": "../assets/Targets/Wave.jpg",
                        "properties": {
                            "left": 0, "top": 0,
                            "width": 830, "height": 830,
                            "originalWidth": 830, "originalHeight": 830,
                            "isRotated": false
                        }
                    },
                ]
            });
        };

        AFRAME.registerComponent('video-playback-on-scan', {
            schema: {
                video: { type: 'selector' }
            },

            init: function () {
                const video = this.data.video;
                if (!video) return;

                video.pause();

                this.onFound = () => video.play();
                this.onLost = () => video.pause();

                this.el.sceneEl.addEventListener('xrimagefound', this.onFound);
                this.el.sceneEl.addEventListener('xrimagelost', this.onLost);
            },

            remove: function () {
                const video = this.data.video;
                if (this.data.video) this.data.video.pause();

                this.el.sceneEl.removeEventListener('xrimagefound', this.onFound);
                this.el.sceneEl.removeEventListener('xrimagelost', this.onLost);
            }
        });


        window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
    </script>
</head>

<body>
    <a-scene xrextras-gesture-detector xrextras-almost-there xrextras-loading xrextras-runtime-error
        xrweb="disableWorldTracking: true">

        <a-camera position="0 4 10"></a-camera>

        <a-assets>
            <video id="poster-video" src="../assets/Wave-2.mp4" loop autoplay playsinline
                webkit-playsinline>
            </video>
        </a-assets>

         <xrextras-named-image-target name="poster" video-playback-on-scan="video: #poster-video">
            <a-video src="#poster-video" width="1" height="0.7" position="0 0 0" rotation="0 0 -90">
            </a-video>
        </xrextras-named-image-target>    
    </a-scene>
</body>

</html>
